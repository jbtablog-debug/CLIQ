<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="img/bhivelogo.jpg">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CLIQ Login</title>
    
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>

<body>

    <div class="header">
            <button class="back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
            <h1>Login Account<i class="fas fa-sign-in-alt"></i></h1>
    </div>

<div id="modal" class="modal">
    <div class="modal-content">
      <span id="close-modal" class="close">&times;</span>
      <p id="modal-message"></p>
    </div>
  </div>

    <div class="container">
     
        <div class="form-container">
            <div class="LogForm">
                <form>
                    <h2>Login to Order</h2><br>
                    <input type="text" placeholder="Username..." id="username" required>
                    
                    <div style="position:relative;">
  <input type="password" placeholder="Password" id="password" required>
  <span id="login-eye" style="position:absolute;right:16px;top:8px;cursor:pointer;color:#888;font-size:18px;">
    <i class="fas fa-eye"></i>
  </span>
</div>
                    <button type="button" id="login">Login</button><br><br>
                    

                    <a class="forgot" href="#">Forgot Password?</a>

                    <hr>
                    <p>Don't have an account? <a href="Sign_Up.html">Sign Up</a> today!</p>
                </form>
            </div>
        </div>
    </div>


<!-- Classic Firebase SDKs (v8) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>

<!-- Your config -->
<script src="js/firebase-config.js"></script>




<script type="module" src="js/login.js" defer></script>
</body>
</html>
