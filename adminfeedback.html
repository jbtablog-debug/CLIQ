<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="img/bhivelogo.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="css/adminfeedback.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="adfeedback-header">
        <button class="back" onclick="window.location.href='admindashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <h1>Feedback <i class="fas fa-comment-dots"></i></h1>
    </div>

    <div class="feedback-content">

        <h2>Customer's Feedback</h2>

        <div class="customer-entries" id="customer-entries">
            <!-- Feedback entries will be injected here by feedback.js -->
        </div>

    </div>


    <div id="success" class="success" style="display: none;">
        Deleted successfully!
    </div>

    <div id="confirmation-modal" class="modal">
  <div class="modal-content">
    <p id="modal-message">Are you sure you want to delete this record?</p>
    <div class="modal-actions">
      <button id="modal-confirm-btn" class="modal-btn confirm">Confirm</button>
      <button id="modal-cancel-btn" class="modal-btn cancel">Cancel</button>
    </div>
  </div>
</div>


<!-- Classic Firebase SDKs (v8) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>

<!-- Your config -->
<script src="js/firebase-config.js"></script>


<script type="module" src="js/adminfeedback.js"></script>

    
</body>
</html>
