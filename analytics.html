<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="img/bhivelogo.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales and Reports</title>
    <link rel="stylesheet" href="css/analytics.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="report-header">
        <button class="back" onclick="window.location.href='admindashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <h1>Sales and Reports <i class="fas fa-chart-bar"></i></h1>
    </div>

    <div style="margin-top: 80px; text-align: center;" class="report-buttons">
    <button id="view-analytics-report" style="margin: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer;">
        View Analytics Report
    </button>
    <button id="view-weekly-report" style="margin: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer;">
        Weekly Sales Report
    </button>
    <button id="view-monthly-report" style="margin: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer;">
        Monthly Sales Report
    </button>
    <button id="view-annual-report" style="margin: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer;">
        Annual Sales Report
    </button>

    <button id="view-archive-records" style="margin: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer;">
        View Archive Records
    </button>
</div>

    <div id="report-content" style="margin-top: 24px; text-align: center;">
        <h3>Sales Report</h3>
<table style="margin: 0 auto; border-collapse: collapse;">
  <tr style="background:#f5f5f5;">
    <th style="padding:8px 16px; border:1px solid #ccc;">Date</th>
    <th style="padding:8px 16px; border:1px solid #ccc;">Total Orders</th>
    <th style="padding:8px 16px; border:1px solid #ccc;">Total Sales</th>
    <th style="padding:8px 16px; border:1px solid #ccc;">GCash Payments</th>
    <th style="padding:8px 16px; border:1px solid #ccc;">Cash Payments</th>
  </tr>
  <tr>
    <td style="padding:8px 16px; border:1px solid #ccc;">2025-10-01</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">35</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">₱3,500.00</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">20</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">15</td>
  </tr>
  <tr>
    <td style="padding:8px 16px; border:1px solid #ccc;">2025-10-02</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">42</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">₱4,200.00</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">25</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">17</td>
  </tr>
  <tr>
    <td style="padding:8px 16px; border:1px solid #ccc;">2025-10-03</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">38</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">₱3,800.00</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">18</td>
    <td style="padding:8px 16px; border:1px solid #ccc;">20</td>
  </tr>
</table>
<p style="margin-top:16px;">Total Sales This Week: <strong>₱11,500.00</strong></p>


<canvas id="popularItemChart" width="400" height="300" style="display:none;margin:24px auto;"></canvas>
  <canvas id="paymentUsageChart" width="400" height="300" style="display:none;margin:24px auto;"></canvas>
  <canvas id="orderTypeChart" width="400" height="300" style="display:none;margin:24px auto;"></canvas>
    
</div>


    <div id="confirmation-modal" class="modal">
  <div class="modal-content">
    <p id="modal-message">Are you sure you want to delete this record?</p>
    <div class="modal-actions">
      <button id="modal-confirm-btn" class="modal-btn confirm">Confirm</button>
      <button id="modal-cancel-btn" class="modal-btn cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Classic Firebase SDKs (v8) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>

<!-- Your config -->
<script src="js/firebase-config.js"></script>


<script type="module" src="js/analytics.js"></script>
    
</body>
</html>
