<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Change Email | CLIQ</title>
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import {
      getAuth,
      isSignInWithEmailLink,
      signInWithEmailLink,
      updateEmail,
      sendEmailVerification
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import {
      getDatabase,
      ref,
      set
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    // --- Firebase Config ---
    const firebaseConfig = {
      apiKey: "AIzaSyAmg4q4LmjqA8DHK1zY4yV8OCRvtAWJeO4",
      authDomain: "cliq-8dba8.firebaseapp.com",
      projectId: "cliq-8dba8",
      storageBucket: "cliq-8dba8.appspot.com",
      messagingSenderId: "545738539503",
      appId: "1:545738539503:web:16560a7ac4cb3e3af0361a",
      databaseURL: "https://cliq-8dba8-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    document.addEventListener("DOMContentLoaded", async () => {
      // --- Check if this page was opened from email link ---
      if (!isSignInWithEmailLink(auth, window.location.href)) {
        document.body.innerHTML = `<p style="color:red;text-align:center;margin-top:50px;">Invalid or expired link.</p>`;
        return;
      }

      // --- Build Reset-style UI ---
      document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#fffbe6;">
          <div style="background:white;padding:24px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.15);max-width:360px;width:100%;text-align:center;">
            <h2>Change Email</h2>
            <p style="font-size:14px;">Please enter your <b>new email address</b> below.</p>
            <input type="email" id="newEmail" placeholder="New Email" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;margin-top:10px;">
            <button id="confirmBtn" style="margin-top:16px;background:#d0b273;border:none;color:black;padding:10px 18px;border-radius:8px;cursor:pointer;">Confirm</button>
            <div id="msg" style="margin-top:12px;font-size:14px;color:#d9534f;"></div>
          </div>
        </div>
      `;

      const confirmBtn = document.getElementById("confirmBtn");
      const msg = document.getElementById("msg");

      confirmBtn.addEventListener("click", async () => {
        const newEmail = document.getElementById("newEmail").value.trim();
        if (!newEmail) {
          msg.textContent = "Please enter your new email.";
          return;
        }

        try {
          // Retrieve old email stored earlier
          let oldEmail = localStorage.getItem("pendingNewEmail");
          if (!oldEmail) {
            oldEmail = prompt("Enter your old email (the one used to receive the link):");
          }

          // Sign in via the email link from Gmail
          const result = await signInWithEmailLink(auth, oldEmail, window.location.href);
          const user = result.user;

          // Update email in Firebase Auth
          await updateEmail(user, newEmail);

          // Update email in Realtime Database
          const dbRef = ref(database, `users/${user.uid}/email`);
          await set(dbRef, newEmail);

          // Send verification to the new email
          await sendEmailVerification(user);

          msg.style.color = "#28a745";
          msg.textContent = "Email successfully updated! Please verify your new email before logging in.";

          // Clean up
          localStorage.removeItem("pendingNewEmail");
          localStorage.setItem("emailChangePending", "true");

          setTimeout(() => {
            window.location.href = "Login2.html";
          }, 2500);
        } catch (error) {
          console.error("Change email link error:", error);
          msg.textContent = "Failed to update email: " + (error.message || error);
        }
      });
    });
  </script>
</head>
<body></body>
</html>
