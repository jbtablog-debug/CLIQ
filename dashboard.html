      <script>
      document.getElementById('order-link').addEventListener('click', function (event) {
    event.preventDefault();

    const cardGroup = document.getElementById('card-group');
    const homeSection = document.getElementById('home');
    const milkteaSection = document.querySelector('.milktea-section');
    const espressoSection = document.querySelector('.espresso-section');
    const fteaSection = document.querySelector('.ftea-section');
    const cartContainer = document.querySelector('.cart-container');
    const historyTab = document.getElementById('history-tab');

    homeSection.style.display = 'none';
    milkteaSection.style.display = 'block';
    espressoSection.style.display = 'none';
    fteaSection.style.display = 'none';
    historyTab.style.display = 'none';
    cardGroup.style.display = 'flex';
    cartContainer.style.display = 'block';

    document.getElementById('card1').click();
});

document.getElementById('home-link').addEventListener('click', function (event) {
    event.preventDefault();

    const cardGroup = document.getElementById('card-group');
    const homeSection = document.getElementById('home');
    const milkteaSection = document.querySelector('.milktea-section');
    const espressoSection = document.querySelector('.espresso-section');
    const fteaSection = document.querySelector('.ftea-section');
    const cartContainer = document.querySelector('.cart-container');
    const historyTab = document.getElementById('history-tab');

    cardGroup.style.display = 'none';
    milkteaSection.style.display = 'none';
    espressoSection.style.display = 'none';
    fteaSection.style.display = 'none';
    historyTab.style.display = 'none';
    homeSection.style.display = 'block';
    cartContainer.style.display = 'none';
});

document.getElementById('history-link').addEventListener('click', function (event) {
    event.preventDefault();

    const cardGroup = document.getElementById('card-group');
    const homeSection = document.getElementById('home');
    const milkteaSection = document.querySelector('.milktea-section');
    const espressoSection = document.querySelector('.espresso-section');
    const fteaSection = document.querySelector('.ftea-section');
    const cartContainer = document.querySelector('.cart-container');
    const historyTab = document.getElementById('history-tab');

    cardGroup.style.display = 'none';
    homeSection.style.display = 'none';
    milkteaSection.style.display = 'none';
    espressoSection.style.display = 'none';
    fteaSection.style.display = 'none';
    historyTab.style.display = 'block';
    cartContainer.style.display = 'none';
});

window.addEventListener('DOMContentLoaded', function() {
    document.getElementById('home-link').click();
});


</script>
