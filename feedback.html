<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="img/bhivelogo.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="css/feedback.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

    <div class="feedback-header">
        <button class="back" onclick="window.location.href='menu.html'"><i class="fas fa-arrow-left"></i></button>
        <h1>Feedback <i class="fas fa-comment-dots"></i></h1>
    </div>

    <div class="feedback-container">

        <h2>Give Feedback</h2>

    <div>
        <div class="star-rating" id="star-rating">
        <i class="fas fa-star" data-value="1"></i>
        <i class="fas fa-star" data-value="2"></i>
        <i class="fas fa-star" data-value="3"></i>
        <i class="fas fa-star" data-value="4"></i>
        <i class="fas fa-star" data-value="5"></i>
        </div>

        <textarea id="feedback-message" placeholder="Tell us your experience..." required></textarea>
    </div>

    <label for="feedback-image" class="custom-file-upload">
    <i class="fas fa-image"></i> Upload an Image
</label>
<input type="file" id="feedback-image" accept="image/*" style="display:none;">
<span id="file-name" class="file-name"></span>

    <div class="button-container">
        <button class="submit-feedback"><i class="fas fa-paper-plane"></i> Submit</button>
    </div>

    </div>

    <div class="feedback-list">

        <h2>Previous Feedback</h2>

        <div class="feedback-entries" id="feedback-entries">
            <!-- Feedback entries will be injected here by feedback.js -->
        </div>

    </div>


    <div id="success" class="success" style="display: none;">
        Feedback submitted successfully!
    </div>

    <div id="confirmation-modal" class="modal">
  <div class="modal-content">
    <p id="modal-message">Are you sure you want to delete this record?</p>
    <div class="modal-actions">
      <button id="modal-confirm-btn" class="modal-btn confirm">Confirm</button>
      <button id="modal-cancel-btn" class="modal-btn cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Classic Firebase SDKs (v8) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>

<!-- Your config -->
<script src="js/firebase-config.js"></script>



<script type="module" src="js/feedback.js"></script>
    
</body>
</html>
