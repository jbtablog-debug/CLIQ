</head>
<body>
    <div class="menuform">

    <div class="menu-header">
        <button class="back" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <h1>Menu <i class="fas fa-bars" id="menu-icon"></i> </h1>
    </div>

        <ul>
            <a href="profile.html"><i class="fas fa-user"></i> Profile</a> <hr>
            <a href="about.html"><i class="fas fa-info-circle"></i> About Us</a> <hr>

        </ul>
    </div>

    <div class="button-container">
        
        <button class="logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>


     <div id="confirmation-modal" class="modal">
  <div class="modal-content">
    <p id="modal-message">Are you sure you want to delete this record?</p>
    <div class="modal-actions">
      <button id="modal-confirm-btn" class="modal-btn confirm">Confirm</button>
      <button id="modal-cancel-btn" class="modal-btn cancel">Cancel</button>
    </div>
  </div>
</div>

    <script>

        document.addEventListener('DOMContentLoaded', function () {
    const logoutBtn = document.querySelector('.logout');
    const modal = document.getElementById('confirmation-modal');
    const modalMessage = document.getElementById('modal-message');
    const confirmBtn = document.getElementById('modal-confirm-btn');
    const cancelBtn = document.getElementById('modal-cancel-btn');

    if (logoutBtn && modal && modalMessage && confirmBtn && cancelBtn) {
        logoutBtn.addEventListener('click', function (e) {
            e.preventDefault();
            modalMessage.textContent = "Are you sure you want to logout?";
            modal.style.display = "flex";
            modal.style.zIndex = "10001";
        });

        confirmBtn.onclick = function () {
            modal.style.display = "none";
            window.location.href = 'index.html';
        };

        cancelBtn.onclick = function () {
            modal.style.display = "none";
        };
    }
});
    </script>
</body>
</html>
