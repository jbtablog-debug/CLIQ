<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="img/bhivelogo.jpg">
    <meta charset="UTF-8">
    <title>Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/cart.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

<div class="cartcontent">

<div class="cartheader">
   <button class="back" onclick="window.location.href='onsitedashboard.html'"><i class="fas fa-arrow-left"></i></button>
    <h1>Order Cart<i class="fas fa-shopping-cart"></i></h1>
</div>


<div class="cart-container" id="cart-container">
    <h2> My Order</h2>
    <div class="cart-items" id="cart-items">
        <!-- Cart items will be dynamically loaded here -->
    </div>
</div>

</div>

<!-- Confirmation Modal (if needed by your JS) -->
<div id="confirmation-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <p id="modal-message">Are you sure you want to delete this item?</p>
        <div class="modal-actions">
            <button id="modal-confirm-btn" class="modal-btn confirm">Yes</button>
            <button id="modal-cancel-btn" class="modal-btn cancel">No</button>
        </div>
    </div>
</div>


<!-- Classic Firebase SDKs (v8) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>

<!-- Your config -->
<script src="js/firebase-config.js"></script>



<script type="module" src="js/onsitecart.js"></script>
</body>
</html>
